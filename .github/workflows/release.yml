name: Release

# Publishes `x39-sacn` to crates.io when a version tag is pushed.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        run: |
          version="$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "x39-sacn") | .version')"
          tag="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml version: $version"
          echo "Git tag:            $tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match crate version '$version'"
            exit 1
          fi

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        run: cargo publish -p x39-sacn --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
